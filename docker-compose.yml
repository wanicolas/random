version: '3.1'

services:
  ghost:
    image: ghost:alpine
    restart: always
    ports:
      - 2368:2368
    environment:
      url: ${GHOST_LOCAL_URL}
      NODE_ENV: ${NODE_ENV}
      # Configuration DB (SQLite par défaut, suffisant pour le dev)
      database__client: sqlite3
      database__connection__filename: /var/lib/ghost/content/data/ghost.db
    volumes:
      # 1. On stocke les données (images, db) dans un volume Docker (caché) pour ne pas polluer le dossier projet.
      - ghost-data:/var/lib/ghost/content
      - ./routes.yaml:/var/lib/ghost/content/settings/routes.yaml
      
      # 2. On injecte le dossier theme local directement dans le dossier themes de Ghost
      - ./theme:/var/lib/ghost/content/themes/random-theme

  # Service Node.js pour builder le thème (Tailwind CSS + outils npm)
  theme-builder:
    image: node:20-alpine
    working_dir: /theme
    volumes:
      - ./theme:/theme
    command: sh -c "npm install && npm run dev"
    stdin_open: true
    tty: true
    restart: unless-stopped
      
volumes:
  ghost-data: